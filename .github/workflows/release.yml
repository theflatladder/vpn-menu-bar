name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent build/VPNMenuBar.app VPNMenuBar-macOS.zip

      - name: Create release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: VPNMenuBar-macOS.zip
          generate_release_notes: true
